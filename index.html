<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚽ Portail Premium Web3</title>
    <style>
      /* Le design professionnel et la protection mobile */
      body { 
        font-family: sans-serif; 
        background-color: #f4f4f9; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        margin: 0;
        overscroll-behavior-y: none; /* 🔴 L'astuce anti pull-to-refresh */
      }
      .card { 
        background: white; 
        padding: 2.5rem; 
        border-radius: 16px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        text-align: center; 
        max-width: 400px; 
        width: 100%; 
      }
      h1 { margin-top: 0; color: #111827; }
      p { color: #4B5563; margin-bottom: 2rem; line-height: 1.5; }
      button { 
        border: none; 
        padding: 14px 20px; 
        margin: 10px 0; 
        border-radius: 10px; 
        cursor: pointer; 
        font-size: 16px; 
        width: 100%; 
        font-weight: bold; 
        transition: transform 0.1s, opacity 0.2s;
      }
      button:active:not(:disabled) { transform: scale(0.98); }
      button:disabled { background: #E5E7EB; color: #9CA3AF; cursor: not-allowed; }
      
      #connectBtn { background: #0052FF; color: white; }
      #buyBtn { background: #10B981; color: white; }
      
      #result { 
        background: #1F2937; 
        color: #10B981; 
        padding: 15px; 
        border-radius: 10px; 
        text-align: left; 
        overflow-x: auto; 
        font-size: 13px; 
        display: none; 
        margin-top: 20px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🏆 Data World Cup</h1>
      <p>Connectez votre portefeuille Base pour débloquer les cotes et statistiques en direct.</p>
      
      <button id="connectBtn">1. Connecter le Portefeuille</button>
      
      <button id="buyBtn" disabled>2. Acheter Cotes Premium (0.05 USDC)</button>
      
      <pre id="result"></pre>
    </div>
    
    <script type="module" src="/main.js"></script>
  </body>
</html>
